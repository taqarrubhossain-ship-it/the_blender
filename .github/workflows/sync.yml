name: CUNY Catalog Sync

on:
  schedule:
    # This runs the script every Monday at 3:00 AM UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:
    # This adds the "Run workflow" button so you can test it immediately

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the Harvester
        env:
          # This pulls the secrets you saved in Step 2
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python harvester.py
